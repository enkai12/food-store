<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración - Food Store</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header>
      <h1>Panel de Administración</h1>
      <nav>
        <ul>
          <li><a href="index.html">Volver a la Tienda</a></li>
          <li><a href="#">Cerrar Sesión</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <!-- Tabla de productos — la clase seccion-tabla da el fondo blanco y la sombra -->
      <section class="seccion-tabla">
        <h2>Gestión de Productos</h2>
        <!-- Sin border="1" — el borde ahora lo maneja admin.css con border-collapse -->
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpo-tabla"></tbody>
        </table>
      </section>
      <!-- Formulario para agregar producto -->
      <section class="seccion-formulario">
        <details>
          <summary>Agregar Producto Rápido</summary>
          <!-- form-producto usa CSS Grid de 2 columnas
               los campos de descripción y el botón tienen clase --ancho
               para que ocupen las 2 columnas -->
          <form class="form-producto">
            <div class="form-producto__campo">
              <label for="nombre-producto">Nombre del Producto:</label>
              <input
                type="text"
                id="nombre-producto"
                name="nombre"
                placeholder="Ej: Lomito Completo"
                autocomplete="off"
                required
              />
            </div>
            <div class="form-producto__campo">
              <label for="select-categoria">Categoría:</label>
              <select id="select-categoria" name="categoria" required>
                <option value="">Seleccione una opción...</option>
              </select>
            </div>
            <div class="form-producto__campo">
              <label for="precio">Precio:</label>
              <input
                type="number"
                id="precio"
                name="precio"
                min="0"
                autocomplete="off"
                required
              />
            </div>
            <div class="form-producto__campo">
              <label for="stock">Stock Inicial:</label>
              <input
                type="number"
                id="stock"
                name="stock"
                min="0"
                autocomplete="off"
                required
              />
            </div>
            <div class="form-producto__campo form-producto__campo--ancho">
              <label for="descripcion">Descripción:</label>
              <textarea
                id="descripcion"
                name="descripcion"
                rows="4"
                placeholder="Ingresa los ingredientes..."
              ></textarea>
            </div>
            <button class="form-producto__boton" type="submit">Guardar Producto</button>
          </form>
        </details>
      </section>
    </main>
    <footer>
      <p>Panel de Administración - Food Store v1.0</p>
    </footer>
    <script src="./js/data.js"></script>
    <script src="./js/admin.js"></script>
  </body>
</html>
