<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6347" />
    <title>Food Store</title>
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <header>
      <h1>Food Store</h1>
      <nav>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="#">Mis Pedidos</a></li>
          <li><a href="#">Carrito (0)</a></li>
          <li><a href="admin.html">Panel Admin</a></li>
        </ul>
      </nav>
    </header>
    <div class="contenedor-principal">
      <aside>
        <h2>Categorías</h2>
        <ul id="lista-categorias"></ul>
      </aside>
      <main>
        <section class="seccion-busqueda">
          <form>
            <label for="buscar">Buscar productos:</label>
            <input
              type="text"
              id="buscar"
              name="buscar"
              placeholder="Ej: Hamburguesa doble"
              autocomplete="off"
            />
            <button type="submit">Buscar</button>
          </form>
        </section>
        <section class="seccion-productos">
          <h2>Productos Destacados</h2>
          <div class="grilla-productos" id="contenedor-productos"></div>
        </section>
      </main>
    </div>
    <footer>
      <p>&copy; 2024 Food Store. Todos los derechos reservados.</p>
      <p>
        Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
      </p>
    </footer>
    <!-- type="module" activa ES Modules en el navegador:
         - cada archivo tiene su propio scope (no contamina el global)
         - los imports se resuelven automáticamente, por eso ya no
           hace falta cargar data.js manualmente acá
         - los módulos se ejecutan en modo estricto ("use strict") por defecto
         - el script se difiere automáticamente (equivale a defer),
           así que el HTML ya está parseado cuando el JS se ejecuta -->
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
